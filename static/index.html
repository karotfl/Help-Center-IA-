<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Help Center ESILV</title>
    <!-- Vue.js 3 via CDN -->
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <!-- Tailwind CSS (for styling) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .chat-container {
            max-width: 1200px;
            margin: 0 auto;
            height: 90vh;
            display: flex;
            flex-direction: column;
        }

        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background-color: #f3f4f6;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        .message {
            margin-bottom: 15px;
            padding: 15px;
            border-radius: 12px;
            max-width: 85%;
            word-wrap: break-word;
        }

        /* Specific styles for bot messages to accommodate rich content */
        .bot {
            background-color: #ffffff;
            border: 1px solid #e5e7eb;
            align-self: flex-start;
            width: 100%;
            /* Allow it to take full width if needed, constrained by max-width */
            max-width: 95%;
            /* More space for Scribe/Images */
        }

        /* Ensure images and iframes (Scribe) fit within the bubble */
        .message img,
        .message iframe {
            max-width: 100% !important;
            height: auto;
            border-radius: 8px;
            margin-top: 10px;
        }

        /* Force iframes (like Scribe) to have a reasonable height if not set */
        .message iframe {
            min-height: 400px;
            width: 100% !important;
        }

        .user {
            background-color: #dbeafe;
            /* Tailwind blue-100 */
            align-self: flex-end;
            margin-left: auto;
            color: #1e3a8a;
            /* Tailwind blue-900 */
        }

        .input-area {
            display: flex;
            gap: 10px;
        }
    </style>
</head>

<body class="bg-gray-100 font-sans">
    <div id="app" class="p-8">
        <h1 class="text-3xl font-bold text-center mb-8 text-blue-800">Assistant Help Center</h1>

        <div class="chat-container bg-white shadow-xl rounded-lg p-6">
            <div class="messages flex flex-col" ref="messagesContainer">
                <div v-for="(msg, index) in messages" :key="index" :class="['message', msg.role]">
                    <div v-if="msg.role === 'bot'" v-html="msg.content"></div>
                    <div v-else>{{ msg.content }}</div>
                </div>
                <div v-if="loading" class="message bot text-gray-500">
                    Calcul de la réponse...
                </div>
            </div>

            <div class="input-area">
                <input type="text" v-model="userInput" @keyup.enter="sendMessage" placeholder="Posez votre question..."
                    class="flex-1 p-3 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                <button @click="sendMessage"
                    class="bg-blue-600 text-white px-6 py-3 rounded-lg hover:bg-blue-700 transition"
                    :disabled="loading">
                    Envoyer
                </button>
            </div>
        </div>
    </div>

    <script>
        const { createApp, ref, nextTick } = Vue;

        createApp({
            setup() {
                // --- State Variables ---
                const messages = ref([
                    { role: 'bot', content: 'Bonjour ! Je suis l\'assistant virtuel du Help Center. Comment puis-je vous aider ?' }
                ]);
                const userInput = ref('');
                const loading = ref(false);
                const messagesContainer = ref(null);

                // --- Helper: Scroll to bottom of chat ---
                const scrollToBottom = async () => {
                    await nextTick();
                    if (messagesContainer.value) {
                        messagesContainer.value.scrollTop = messagesContainer.value.scrollHeight;
                    }
                };

                // --- Main Logic: Send Message to Backend ---
                const sendMessage = async () => {
                    if (!userInput.value.trim()) return;

                    // 1. Display User Message
                    const question = userInput.value;
                    messages.value.push({ role: 'user', content: question });
                    userInput.value = '';
                    loading.value = true;
                    scrollToBottom();

                    try {
                        // Prepare history payload (excluding the very first welcome message and the newest user message just added)
                        // We want to pass the previous context.
                        const historyPayload = messages.value
                            .slice(1, -1) // Remove first (welcome) and last (current question)
                            .map(msg => ({
                                role: msg.role === 'bot' ? 'assistant' : 'user',
                                content: msg.content
                            }));

                        // 2. Call API (FastAPI Backend)
                        const response = await fetch('/chat', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ 
                                question: question,
                                history: historyPayload
                            })
                        });

                        const data = await response.json();

                        // 3. Display Bot Response (rendering HTML)
                        messages.value.push({ role: 'bot', content: data.answer_html });
                    } catch (error) {
                        console.error('Error:', error);
                        messages.value.push({ role: 'bot', content: "Désolé, une erreur est survenue. Veuillez réessayer plus tard." });
                    } finally {
                        loading.value = false;
                        scrollToBottom();
                    }
                };

                return {
                    messages,
                    userInput,
                    sendMessage,
                    loading,
                    messagesContainer
                };
            }
        }).mount('#app');
    </script>
</body>

</html>
